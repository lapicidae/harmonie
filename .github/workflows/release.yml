name: release

# Auto-tag every push to main with the next version.
#
# Default bump is the patch component. Override with a marker anywhere
# in the commit message (subject or body):
#
#   [bump minor]   -> 1.0.5 → 1.1.0
#   [bump major]   -> 1.1.0 → 2.0.0
#   [skip release] -> no tag created (alias: [skip ci])
#
# Markers are matched as literal substrings, so a commit message that
# discusses the markers (in a code fence, prose, or a PR-quoted reply)
# can still accidentally trigger them. Use [skip release] on any
# meta-commit that mentions the marker syntax verbatim.

on:
  push:
    branches: [main]

# Serialise so two pushes in quick succession don't both compute the
# same next version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so git tag --list sees every prior version.
          fetch-depth: 0
          fetch-tags: true

      - name: Decide bump
        id: decide
        run: |
          # %B is the full message (subject + body). Markers are
          # matched as literal substrings anywhere in it.
          message=$(git log -1 --pretty=%B)
          echo "message:"
          echo "$message" | sed 's/^/  /'
          if echo "$message" | grep -qE '\[skip release\]|\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release per marker."
          elif echo "$message" | grep -qE '\[bump major\]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$message" | grep -qE '\[bump minor\]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.decide.outputs.skip == 'false'
        id: bump
        env:
          LEVEL: ${{ steps.decide.outputs.level }}
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "$LEVEL" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "unknown bump level: $LEVEL" >&2; exit 1 ;;
          esac
          new="v${major}.${minor}.${patch}"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest} -> ${new} (level=${LEVEL})"

      - name: Push tag
        if: steps.decide.outputs.skip == 'false'
        env:
          NEW_TAG: ${{ steps.bump.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub release
        if: steps.decide.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new }}
          name: ${{ steps.bump.outputs.new }}
          generate_release_notes: true
