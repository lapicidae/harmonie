name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is our declared minimum; 3.11 matches the production
        # Dockerfile. Two versions cover the surface without bloating CI.
        python-version: ['3.9', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        # --pre because essentia-tensorflow is a .dev pre-release.
        run: |
          python -m pip install --upgrade pip
          pip install --pre -e ".[dev]"

      - name: Run tests
        run: pytest -q

  # ---------------------------------------------------------------------
  # Docker build (always) + push (main / tags only)
  #
  # Built for linux/amd64 only. Essentia (and essentia-tensorflow) publish
  # only manylinux_2_17_x86_64 wheels on PyPI — no linux/aarch64 wheel
  # exists, so a multi-arch build would fail on the arm64 leg. Apple
  # Silicon and other arm64 hosts run the amd64 image via Rosetta /
  # qemu-user, which Docker handles transparently.
  # ---------------------------------------------------------------------
  docker:
    name: docker (build${{ github.event_name == 'pull_request' && '' || ' & push' }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build${{ github.event_name == 'pull_request' && '' || ' and push' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          # Push only when this is a real merge to main or a tag — never on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
